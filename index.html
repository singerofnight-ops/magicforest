<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Волшебный Фонарик - Охота за буквами</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');

        :root {
            --bg-dark: #07131f; /* Темно-синий лес */
            --primary: #ff9800;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Nunito', sans-serif;
            overflow: hidden; /* Запрещаем прокрутку */
            background-color: var(--bg-dark);
            color: white;
            touch-action: none; /* Запрещаем жесты браузера на мобильных */
        }

        /* Экран настроек */
        #setup-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
            text-align: center;
        }

        .setup-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #ddd;
        }

        input[type="text"] {
            width: 90%;
            padding: 15px;
            font-size: 1.5rem;
            border: 3px solid var(--primary);
            border-radius: 15px;
            outline: none;
            text-align: center;
            text-transform: uppercase;
            font-family: 'Nunito', sans-serif;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }

        button.btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 900;
            box-shadow: 0 5px 15px rgba(255, 152, 0, 0.4);
            transition: transform 0.2s, background 0.2s;
            font-family: 'Nunito', sans-serif;
        }

        button.btn:hover {
            background-color: #ffb74d;
            transform: scale(1.05);
        }

        button.btn:active {
            transform: scale(0.95);
        }

        /* --- НОВЫЕ СТИЛИ ДЛЯ ЗВЕЗДНОГО НЕБА --- */
        #stars-screen {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, #020111 10%, #20124d 100%);
            overflow: hidden;
        }

        /* Рисуем маленькие фоновые звездочки */
        .bg-star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle 2s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 0.8; transform: scale(1.2); }
        }

        /* Добавляем светящийся месяц */
        .moon {
            position: absolute;
            top: 8%;
            right: 12%;
            width: 80px;
            height: 80px;
            background: transparent;
            border-radius: 50%;
            box-shadow: -15px 15px 0 0 #ffeb3b;
            filter: drop-shadow(0 0 25px rgba(255, 235, 59, 0.5));
            z-index: 5;
        }

        #stars-container {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 10;
        }

        .star-item {
            position: absolute;
            cursor: pointer;
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translate(-50%, -50%);
            transition: transform 0.2s;
        }

        .star-item:hover {
            transform: translate(-50%, -50%) scale(1.1);
        }

        .star-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.8));
        }

        .star-letter {
            position: absolute;
            font-size: 3.5rem;
            font-weight: 900;
            color: #b71c1c; /* Темно-красный цвет буквы для контраста */
            text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff; /* Белая обводка */
            pointer-events: none; /* Чтобы клик шел на саму звезду */
        }

        .star-item.falling {
            animation: fallDown 1.5s forwards cubic-bezier(0.55, 0.085, 0.68, 0.53);
            pointer-events: none;
        }

        @keyframes fallDown {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(calc(-50% + 150px), 100vh) scale(0.5) rotate(180deg); opacity: 0; }
        }

        .mode-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-star {
            background-color: #673ab7;
            box-shadow: 0 5px 15px rgba(103, 58, 183, 0.4);
        }

        .btn-star:hover {
            background-color: #7e57c2;
        }

        /* Игровой экран */
        #game-screen {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" opacity="0.1"><circle cx="50" cy="50" r="2" fill="white"/></svg>');
            background-color: #0b141a; /* Очень темный фон леса */
        }

        /* Слой с буквами */
        #items-container {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 10;
        }

        .game-item {
            position: absolute;
            font-size: 5rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
            cursor: pointer;
            user-select: none;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100px;
            height: 100px;
            transform: translate(-50%, -50%); /* Центрирование по координатам */
        }

        /* Анимация при нахождении буквы */
        .game-item.found {
            font-size: 6rem;
            text-shadow: 0 0 50px #ffeb3b, 0 0 20px #ff9800;
            color: #ffeb3b;
            z-index: 20;
            animation: bounceIn 0.8s ease;
        }

        /* Слой фонарика (темнота) */
        #flashlight-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 15;
            pointer-events: none; /* ПРОПУСКАЕТ КЛИКИ СКВОЗЬ СЕБЯ К БУКВАМ */
            /* Начальное положение по центру */
            background: radial-gradient(circle at 50% 50%, transparent 80px, rgba(5, 10, 15, 0.98) 180px);
            transition: background 0.1s;
        }

        /* Кнопка "Назад" во время игры */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 30;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.4);
        }

        /* Поздравительное сообщение */
        .win-message {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 40;
            background: rgba(0,0,0,0.8);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            border: 4px solid var(--primary);
            box-shadow: 0 0 50px var(--primary);
        }

        .win-message h2 {
            font-size: 3rem;
            color: #ffeb3b;
            margin: 0 0 20px 0;
        }

        @keyframes bounceIn {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2); }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

    </style>
</head>
<body>

    <!-- ЭКРАН НАСТРОЕК -->
    <div id="setup-screen">
        <div class="setup-box">
            <h1>🔦 Волшебный Лес</h1>
            <p>Впишите буквы, которые хотите спрятать (через пробел, запятую или просто подряд):</p>
            <input type="text" id="letters-input" value="А О У М С" placeholder="Например: А О У М С" autocomplete="off">
            <br>
            <div class="mode-buttons">
                <button class="btn" onclick="startGame('flashlight')">🔦 Фонарик</button>
                <button class="btn btn-star" onclick="startGame('stars')">⭐ Звездопад</button>
            </div>
        </div>
    </div>

    <!-- ИГРОВОЙ ЭКРАН (ФОНАРИК) -->
    <div id="game-screen">
        <button class="back-btn" onclick="endGame()">🚪 Выйти</button>
        <div id="items-container"></div>
        <div id="flashlight-overlay"></div>
        
        <div id="win-message-flashlight" class="win-message">
            <h2>Ура! Все найдено! 🎉</h2>
            <button class="btn" onclick="endGame()">Играть еще</button>
        </div>
    </div>

    <!-- ИГРОВОЙ ЭКРАН (ЗВЕЗДНОЕ НЕБО) -->
    <div id="stars-screen">
        <button class="back-btn" onclick="endGame()">🚪 Выйти</button>
        
        <!-- Месяц и контейнер для множества мерцающих звезд -->
        <div class="moon"></div>
        <div id="bg-stars-container"></div>

        <div id="stars-container"></div>
        
        <div id="win-message-stars" class="win-message">
            <h2>Все звезды собраны! 🌟</h2>
            <button class="btn btn-star" onclick="endGame()">В меню</button>
        </div>
    </div>

    <script>
        // Словарь: Буква -> Картинка (Эмодзи)
        const dictionary = {
            'А': '🍉', // Арбуз
            'Б': '🍌', // Банан
            'В': '🚁', // Вертолет
            'Г': '🍄', // Гриб
            'Д': '🏠', // Дом
            'Е': '🦝', // Енот
            'Ё': '🦔', // Ёжик
            'Ж': '🦒', // Жираф
            'З': '☂️', // Зонт
            'И': '🧸', // Игрушка
            'Й': '🧘', // Йог
            'К': '🐱', // Кот
            'Л': '🦊', // Лиса
            'М': '🚗', // Машина
            'Н': '✂️', // Ножницы
            'О': '🐒', // Обезьяна
            'П': '🐧', // Пингвин
            'Р': '🚀', // Ракета
            'С': '🐘', // Слон
            'Т': '🐯', // Тигр
            'У': '🐌', // Улитка
            'Ф': '🔦', // Фонарик
            'Х': '🍞', // Хлеб
            'Ц': '🐥', // Цыпленок
            'Ч': '🐢', // Черепаха
            'Ш': '🎈', // Шарик
            'Щ': '🪥', // Щетка
            'Э': '🚜', // Экскаватор
            'Ю': '🏕️', // Юрта/Палатка
            'Я': '🍎'  // Яблоко
        };

        // --- ГЕНЕРАТОР ПРИЯТНЫХ ЗВУКОВ (Web Audio API) ---
        const audio = {
            ctx: null,
            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            },
            playClick() {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(200, this.ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
                osc.start(); osc.stop(this.ctx.currentTime + 0.1);
            },
            playMagic() {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1000, this.ctx.currentTime + 0.3);
                gain.gain.setValueAtTime(0, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.3, this.ctx.currentTime + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
                osc.start(); osc.stop(this.ctx.currentTime + 0.3);
            },
            playStar() {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1500, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(300, this.ctx.currentTime + 1.2);
                gain.gain.setValueAtTime(0, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.3, this.ctx.currentTime + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 1.2);
                osc.start(); osc.stop(this.ctx.currentTime + 1.2);
            },
            playWin() {
                if (!this.ctx) return;
                const notes = [523.25, 659.25, 783.99, 1046.50]; // Аккорд До-мажор (C5, E5, G5, C6)
                notes.forEach((freq, i) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.connect(gain); gain.connect(this.ctx.destination);
                    osc.type = 'sine';
                    const t = this.ctx.currentTime + i * 0.15;
                    osc.frequency.setValueAtTime(freq, t);
                    gain.gain.setValueAtTime(0, t);
                    gain.gain.linearRampToValueAtTime(0.3, t + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
                    osc.start(t); osc.stop(t + 0.5);
                });
            }
        };

        let foundCount = 0;
        let totalCount = 0;
        let isGameRunning = false;
        let currentMode = '';
        let placedStarsPositions = []; // Для проверки наложения звезд
        let bgStarsGenerated = false;  // Флаг, чтобы не рисовать фон дважды

        const setupScreen = document.getElementById('setup-screen');
        const gameScreen = document.getElementById('game-screen');
        const starsScreen = document.getElementById('stars-screen');
        const itemsContainer = document.getElementById('items-container');
        const starsContainer = document.getElementById('stars-container');
        const overlay = document.getElementById('flashlight-overlay');
        const winMessageFlashlight = document.getElementById('win-message-flashlight');
        const winMessageStars = document.getElementById('win-message-stars');
        const lettersInput = document.getElementById('letters-input');

        // Функция запуска игры
        function startGame(mode) {
            audio.init(); // Инициализируем аудио при первом клике пользователя
            audio.playClick(); // Звук клика

            // Получаем буквы из инпута, переводим в верхний регистр, убираем пробелы и запятые
            const rawText = lettersInput.value.toUpperCase();
            // Вытаскиваем только русские буквы
            const letters = rawText.match(/[А-ЯЁ]/g);

            if (!letters || letters.length === 0) {
                alert("Пожалуйста, введите хотя бы одну русскую букву!");
                return;
            }

            currentMode = mode;
            setupScreen.style.display = 'none';
            winMessageFlashlight.style.display = 'none';
            winMessageStars.style.display = 'none';
            
            foundCount = 0;
            totalCount = letters.length;
            isGameRunning = true;

            if (mode === 'flashlight') {
                gameScreen.style.display = 'block';
                starsScreen.style.display = 'none';
                itemsContainer.innerHTML = '';
                
                // Размещаем буквы на экране
                letters.forEach(letter => {
                    createLetterElement(letter);
                });

                // Ставим фонарик в центр при старте
                updateFlashlight(window.innerWidth / 2, window.innerHeight / 2);
            } else if (mode === 'stars') {
                gameScreen.style.display = 'none';
                starsScreen.style.display = 'block';
                starsContainer.innerHTML = '';
                placedStarsPositions = []; // Очищаем координаты перед новой игрой

                // Генерируем 70 фоновых звездочек один раз
                if (!bgStarsGenerated) {
                    generateBgStars();
                    bgStarsGenerated = true;
                }

                // Размещаем звезды на небе
                letters.forEach(letter => {
                    createStarElement(letter, letters.length);
                });
            }
        }

        // Завершение игры и возврат в меню
        function endGame() {
            audio.playClick(); // Звук клика
            isGameRunning = false;
            currentMode = '';
            gameScreen.style.display = 'none';
            starsScreen.style.display = 'none';
            setupScreen.style.display = 'flex';
        }

        // Генерация красивого фона со множеством мерцающих звезд
        function generateBgStars() {
            const bgContainer = document.getElementById('bg-stars-container');
            const colors = ['#ffffff', '#ffeb3b', '#b3e5fc', '#ffcdd2']; // Белые, желтые, голубые, розоватые
            
            for (let i = 0; i < 70; i++) {
                const star = document.createElement('div');
                star.className = 'bg-star';
                
                const size = Math.random() * 4 + 1; // Размер от 1 до 5 пикселей
                const top = Math.random() * 100;
                const left = Math.random() * 100;
                const delay = Math.random() * 3; // Разное время начала мерцания
                const duration = Math.random() * 2 + 1; // Разная скорость мерцания
                const color = colors[Math.floor(Math.random() * colors.length)];
                
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.top = `${top}%`;
                star.style.left = `${left}%`;
                star.style.backgroundColor = color;
                star.style.animationDelay = `${delay}s`;
                star.style.animationDuration = `${duration}s`;
                
                bgContainer.appendChild(star);
            }
        }

        // Создание элемента звезды для режима "Звездопад"
        function createStarElement(letter, totalLetters) {
            const el = document.createElement('div');
            el.className = 'star-item';

            // Вычисляем безопасное расстояние (чем больше букв, тем плотнее они могут стоять)
            const minDist = Math.max(12, 25 - totalLetters); // Минимум 12%, максимум 25% экрана

            let top, left, valid = false;
            let attempts = 0;

            // Алгоритм предотвращения наложения
            while (!valid && attempts < 100) {
                top = Math.floor(Math.random() * 70) + 15; // 15% - 85% по вертикали
                left = Math.floor(Math.random() * 80) + 10; // 10% - 90% по горизонтали
                valid = true;

                for (let pos of placedStarsPositions) {
                    // Вычисляем дистанцию до уже стоящих звезд по Пифагору
                    let dx = pos.left - left;
                    let dy = pos.top - top;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < minDist) {
                        valid = false;
                        break;
                    }
                }
                attempts++;
            }

            // Запоминаем финальную позицию для следующих проверок
            placedStarsPositions.push({top, left});

            el.style.top = top + '%';
            el.style.left = left + '%';

            // Рандомный размер звезды для разнообразия
            const scale = 0.8 + Math.random() * 0.4; // от 0.8 до 1.2
            el.style.transform = `translate(-50%, -50%) scale(${scale})`;

            // Вставляем SVG звезду и букву поверх неё
            el.innerHTML = `
                <svg class="star-svg" viewBox="0 0 51 48" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#FFD700" d="m25,1 6,17h18l-14,11 5,17-15-10-15,10 5-17-14-11h18z"/>
                </svg>
                <span class="star-letter">${letter}</span>
            `;

            // Обработка клика
            el.onclick = function() {
                if (el.classList.contains('falling')) return; // Если уже падает - ничего не делаем

                el.classList.add('falling');
                audio.playStar(); // Волшебный звук падающей звезды

                foundCount++;
                if (foundCount >= totalCount) {
                    setTimeout(() => {
                        audio.playWin(); // Победный аккорд
                        winMessageStars.style.display = 'block';
                    }, 1500); // Ждем пока упадет последняя звезда
                }
            };

            starsContainer.appendChild(el);
        }

        // Создание элемента буквы на поле
        function createLetterElement(letter) {
            const el = document.createElement('div');
            el.className = 'game-item';
            el.innerText = letter;

            // Рандомная позиция (от 10% до 90% экрана, чтобы не вылезало за края)
            const top = Math.floor(Math.random() * 80) + 10;
            const left = Math.floor(Math.random() * 80) + 10;
            
            el.style.top = top + '%';
            el.style.left = left + '%';
            
            // Немного поворачиваем буквы для игривости
            const rotation = Math.floor(Math.random() * 40) - 20; // от -20 до +20 градусов
            el.style.transform = `translate(-50%, -50%) rotate(${rotation}deg)`;

            // Обработка клика
            el.onclick = function() {
                if (el.classList.contains('found')) return; // Если уже нашли - ничего не делаем

                el.classList.add('found');
                audio.playMagic(); // Звук волшебного превращения
                
                // Вспышка фонарика при правильном клике
                flashLight();

                // Превращаем букву в картинку
                const emoji = dictionary[letter] || '⭐'; // Звездочка, если буквы нет в словаре (например Ъ)
                el.innerText = emoji;
                el.style.transform = `translate(-50%, -50%) rotate(0deg) scale(1.2)`; // Убираем наклон

                foundCount++;
                if (foundCount >= totalCount) {
                    setTimeout(() => {
                        audio.playWin(); // Победный аккорд
                        winMessageFlashlight.style.display = 'block';
                    }, 1000);
                }
            };

            itemsContainer.appendChild(el);
        }

        // Управление фонариком
        function updateFlashlight(x, y) {
            if (!isGameRunning || currentMode !== 'flashlight') return;
            // Создаем градиент: прозрачный круг (свет) переходящий в почти черную темноту
            overlay.style.background = `radial-gradient(circle at ${x}px ${y}px, transparent 60px, rgba(5, 10, 15, 0.98) 160px)`;
        }

        // Вспышка (когда ребенок кликает на букву)
        function flashLight() {
            overlay.style.background = 'transparent'; // Резко убираем темноту
            setTimeout(() => {
                // Возвращаем темноту к текущей позиции мыши
                // (Примерно в центр экрана или к последним известным координатам)
                overlay.style.background = ''; 
            }, 300);
        }

        // Отслеживание мыши
        document.addEventListener('mousemove', (e) => {
            updateFlashlight(e.clientX, e.clientY);
        });

        // Отслеживание пальца на планшете/телефоне
        document.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            updateFlashlight(touch.clientX, touch.clientY);
        });

        document.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            updateFlashlight(touch.clientX, touch.clientY);
        });

    </script>
</body>
</html>
